<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NeuroPrompt Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: '#0a0a0a',
                        graphite: '#1e1e1e',
                        gold: '#c5a059',
                        emerald: '#2d5a4c',
                        silver: '#e0e0e0',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-charcoal text-silver h-screen overflow-hidden">

    <div class="flex h-full">
        <!-- Left Side: Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-20 relative overflow-hidden">
            <!-- Animated Background -->
            <div class="absolute -top-40 -left-40 w-96 h-96 bg-gold/5 rounded-full blur-[100px] animate-pulse"></div>
            <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-emerald/5 rounded-full blur-[100px] animate-pulse" style="animation-delay: 2s"></div>

            <div class="w-full max-w-md relative z-10 reveal">
                <div class="flex items-center justify-between mb-12">
                    <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <div class="w-8 h-8 bg-emerald rounded flex items-center justify-center">
                            <span class="text-gold font-bold">N</span>
                        </div>
                        <span class="text-xl font-bold tracking-tight text-white">NP Lab</span>
                    </a>
                    <div class="flex items-center gap-2">
                        <button id="theme-toggle" class="p-2 hover:bg-white/5 rounded-full transition-colors" title="Toggle Theme">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                            </svg>
                        </button>
                        <button id="rtl-toggle" class="text-xs font-bold px-2 py-1 border border-white/20 rounded hover:bg-white/5 transition-colors">RTL</button>
                    </div>
                </div>

                <h1 class="text-4xl font-bold mb-2">Welcome Back</h1>
                <p class="text-silver/40 mb-10">Access your LLM optimization dashboard.</p>

                <form class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-silver/40 uppercase mb-2">Work Email</label>
                        <input type="email" class="w-full bg-graphite/50 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-gold/50 transition-colors" placeholder="name@company.ai">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="block text-xs font-bold text-silver/40 uppercase">Password</label>
                            <a href="#" class="text-xs text-gold hover:underline">Forgot?</a>
                        </div>
                        <input type="password" class="w-full bg-graphite/50 border border-white/10 rounded-lg px-4 py-3 focus:outline-none focus:border-gold/50 transition-colors" placeholder="••••••••">
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember" class="accent-gold">
                        <label for="remember" class="text-sm text-silver/60">Keep me authenticated</label>
                    </div>
                    <button type="submit" onclick="window.location.href='index.html'; return false;" class="w-full bg-white text-charcoal py-4 rounded-lg font-bold hover:bg-gold transition-all">Sign In</button>
                    
                    <div class="relative py-4">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
                        <div class="relative flex justify-center text-xs uppercase"><span class="bg-charcoal px-2 text-silver/20">or continue with</span></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" class="flex items-center justify-center gap-2 border border-white/10 rounded-lg py-3 hover:bg-white/5 transition-colors">
                            <span class="text-sm">Google</span>
                        </button>
                        <button type="button" class="flex items-center justify-center gap-2 border border-white/10 rounded-lg py-3 hover:bg-white/5 transition-colors">
                            <span class="text-sm">GitHub</span>
                        </button>
                    </div>
                </form>

                <p class="mt-10 text-center text-sm text-silver/40">
                    New to the lab? <a href="signup.html" class="text-gold font-bold hover:underline">Request access</a>
                </p>
            </div>
        </div>

        <!-- Right Side: Visual -->
        <div class="hidden lg:block w-1/2 relative overflow-hidden">
            <img src="assets/dashboard_preview.png" alt="Dashboard Preview" class="w-full h-full object-cover grayscale opacity-60 contrast-125">
            <div class="absolute inset-0 bg-gradient-to-l from-charcoal via-transparent to-charcoal"></div>
            <div class="absolute bottom-20 left-20 max-w-sm">
                <div class="glass p-8">
                    <p class="text-xl font-medium text-white italic mb-4">"The precision of NeuroPrompt has fundamentally changed how we deploy AI at scale."</p>
                    <p class="text-sm font-bold text-gold">— CTO, Quantum Nexus</p>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
